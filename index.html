<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Sumba Timur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#0EA5E9', 'primary-dark': '#0284C7', secondary: '#F97316', 'secondary-dark': '#EA580C', accent: '#16A34A', 'accent-dark': '#15803D', dark: { bg: '#0F172A', card: '#1E293B', border: '#334155', hover: '#2D3A4F' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'], inter: ['Inter', 'sans-serif'] } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>

<body class="bg-white text-gray-800 dark:bg-dark-bg dark:text-gray-100">

    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="#" id="logo-btn" class="flex items-center gap-2 z-10">
                    <iconify-icon icon="lucide:compass" class="text-primary text-2xl"></iconify-icon>
                    <span class="font-poppins font-bold text-lg md:text-xl text-gray-800 dark:text-white">Explore <span class="text-primary">Sumba Timur</span></span>
                </a>
                <div class="hidden md:flex items-center gap-1" id="desk-nav"></div>
                <div class="flex items-center gap-2">
                    <button id="wl-btn" class="relative p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-card transition-all" title="Wishlist">
                        <iconify-icon icon="lucide:heart" class="text-xl text-gray-700 dark:text-gray-200"></iconify-icon>
                        <span id="wl-badge" class="absolute -top-1 -right-1 w-5 h-5 bg-secondary text-white text-[10px] font-bold rounded-full items-center justify-center hidden">0</span>
                    </button>
                    <button id="cart-btn" class="relative p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-card transition-all" title="Keranjang">
                        <iconify-icon icon="lucide:shopping-cart" class="text-xl text-gray-700 dark:text-gray-200"></iconify-icon>
                        <span id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 bg-secondary text-white text-[10px] font-bold rounded-full items-center justify-center hidden">0</span>
                    </button>
                    <button id="dm-btn" class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-card transition-all" title="Dark Mode">
                        <!-- <iconify-icon icon="lucide:sun" class="text-xl text-gray-700 dark:text-gray-200 dark:hidden"></iconify-icon> -->
                        <!-- <iconify-icon icon="lucide:moon" class="text-xl text-gray-200 hidden dark:inline-block"></iconify-icon> -->
                    </button>
                    <button id="mm-btn" class="md:hidden p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-card transition-all">
                        <iconify-icon icon="lucide:menu" class="text-xl text-gray-700 dark:text-gray-200" id="mm-icon"></iconify-icon>
                    </button>
                </div>
            </div>
        </div>
        <div id="mob-menu" class="md:hidden hidden border-t border-gray-200 dark:border-dark-border bg-white dark:bg-dark-card">
            <div class="px-4 py-3 space-y-1" id="mob-nav"></div>
        </div>
    </nav>

    <main id="app"></main>

    <div class="ov" id="cart-ov"></div>
    <div class="pn bg-white dark:bg-dark-card shadow-2xl" id="cart-pn">
        <div class="flex flex-col h-full">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-dark-border">
                <h3 class="font-poppins font-semibold text-lg text-gray-800 dark:text-white">Keranjang</h3>
                <button id="cart-x" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-bg rounded-xl"><iconify-icon icon="lucide:x" class="text-xl text-gray-600 dark:text-gray-300"></iconify-icon></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4" id="cart-list"></div>
            <div class="border-t border-gray-200 dark:border-dark-border p-4" id="cart-ft" style="display:none">
                <div class="flex justify-between mb-2 text-sm text-gray-600 dark:text-gray-300"><span>Subtotal</span><span id="cart-sub" class="font-semibold text-gray-800 dark:text-white">Rp 0</span></div>
                <div class="flex justify-between mb-4 text-sm text-gray-600 dark:text-gray-300"><span>Biaya Layanan</span><span class="text-accent font-medium">Gratis</span></div>
                <div class="flex justify-between mb-4 font-poppins font-bold text-lg text-gray-800 dark:text-white"><span>Total</span><span id="cart-tot" class="text-primary">Rp 0</span></div>
                <button id="cko-btn" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-2xl transition-all flex items-center justify-center gap-2"><iconify-icon icon="lucide:credit-card"></iconify-icon> Checkout</button>
            </div>
        </div>
    </div>

    <div class="mo" id="cko-modal">
        <div class="bg-white dark:bg-dark-card rounded-3xl shadow-2xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto asi">
            <div class="p-6 border-b border-gray-200 dark:border-dark-border flex justify-between items-center">
                <h3 class="font-poppins font-bold text-xl text-gray-800 dark:text-white">Checkout</h3><button id="cko-x" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-bg rounded-xl"><iconify-icon icon="lucide:x" class="text-xl text-gray-600 dark:text-gray-300"></iconify-icon></button>
            </div>
            <div class="p-6 space-y-4">
                <div><label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-200">Nama Lengkap</label><input type="text" id="f-name" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-dark-border bg-white dark:bg-dark-bg text-gray-800 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none" placeholder="Masukkan nama"></div>
                <div><label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-200">Nomor WhatsApp</label><input type="tel" id="f-phone" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-dark-border bg-white dark:bg-dark-bg text-gray-800 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none" placeholder="08xxxxxxxxxx"></div>
                <div><label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-200">Email</label><input type="email" id="f-email" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-dark-border bg-white dark:bg-dark-bg text-gray-800 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none" placeholder="email@contoh.com"></div>
                <div><label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-200">Metode Pembayaran</label><select id="f-pay" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-dark-border bg-white dark:bg-dark-bg text-gray-800 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none"><option>Bayar di Lokasi</option><option>Transfer Bank</option><option>E-Wallet</option></select></div>
                <div><label class="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-200">Catatan (opsional)</label><textarea id="f-note" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-dark-border bg-white dark:bg-dark-bg text-gray-800 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none resize-none" placeholder="Catatan tambahan..."></textarea></div>
                <div class="bg-gray-50 dark:bg-dark-bg rounded-2xl p-4">
                    <h4 class="font-semibold mb-2 text-gray-800 dark:text-white">Ringkasan Pesanan</h4>
                    <div id="cko-items" class="space-y-2 text-sm text-gray-600 dark:text-gray-300"></div>
                    <div class="border-t border-gray-200 dark:border-dark-border mt-3 pt-3 flex justify-between font-bold text-gray-800 dark:text-white"><span>Total</span><span id="cko-tot" class="text-primary">Rp 0</span></div>
                </div><button id="cko-confirm" class="w-full bg-accent hover:bg-accent-dark text-white font-semibold py-3.5 rounded-2xl transition-all flex items-center justify-center gap-2"><iconify-icon icon="lucide:check-circle"></iconify-icon> Konfirmasi Pesanan</button>
            </div>
        </div>
    </div>

    <div class="mo" id="suc-modal">
        <div class="bg-white dark:bg-dark-card rounded-3xl shadow-2xl max-w-md w-full mx-4 asi text-center relative overflow-hidden">
            <div id="cf-box" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            <div class="relative z-10 p-8">
                <div class="w-20 h-20 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-5 scc"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path class="scp" d="M10 20L17 27L30 13" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" /></svg></div>
                <h3 class="font-poppins font-bold text-2xl mb-2 text-gray-800 dark:text-white">Pesanan Berhasil!</h3>
                <p class="text-gray-500 dark:text-gray-400 text-sm mb-5">Pesanan Anda telah dikonfirmasi.</p>
                <div class="bg-gray-50 dark:bg-dark-bg rounded-2xl p-4 mb-5 text-left">
                    <div class="flex justify-between text-sm mb-2 text-gray-600 dark:text-gray-300"><span>No. Pesanan</span><span class="font-bold text-primary" id="s-oid">-</span></div>
                    <div class="flex justify-between text-sm mb-2 text-gray-600 dark:text-gray-300"><span>Nama</span><span class="font-medium text-gray-800 dark:text-white" id="s-nm">-</span></div>
                    <div class="flex justify-between text-sm mb-2 text-gray-600 dark:text-gray-300"><span>Pembayaran</span><span class="font-medium text-gray-800 dark:text-white" id="s-py">-</span></div>
                    <div class="flex justify-between text-sm mb-2 text-gray-600 dark:text-gray-300"><span>Jumlah Item</span><span class="font-medium text-gray-800 dark:text-white" id="s-it">0</span></div>
                    <div class="border-t border-gray-200 dark:border-dark-border my-2"></div>
                    <div class="flex justify-between text-sm font-bold text-gray-800 dark:text-white"><span>Total</span><span class="text-primary" id="s-tt">Rp 0</span></div>
                </div><button id="suc-close" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-2xl transition-all">Kembali Jelajahi</button>
            </div>
        </div>
    </div>

    <div class="ov" id="wl-ov"></div>
    <div class="pn bg-white dark:bg-dark-card shadow-2xl" id="wl-pn" style="max-width:380px">
        <div class="flex flex-col h-full">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-dark-border">
                <h3 class="font-poppins font-semibold text-lg text-gray-800 dark:text-white">Wishlist</h3><button id="wl-x" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-bg rounded-xl"><iconify-icon icon="lucide:x" class="text-xl text-gray-600 dark:text-gray-300"></iconify-icon></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4" id="wl-list"></div>
        </div>
    </div>

    <div class="lb" id="lb-box">
        <button id="lb-close" class="absolute top-4 right-4 text-white/80 hover:text-white p-2 z-10"><iconify-icon icon="lucide:x" class="text-3xl"></iconify-icon></button>
        <button id="lb-prev" class="absolute left-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white p-2 z-10"><iconify-icon icon="lucide:chevron-left" class="text-4xl"></iconify-icon></button>
        <button id="lb-next" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white p-2 z-10"><iconify-icon icon="lucide:chevron-right" class="text-4xl"></iconify-icon></button>
        <img id="lb-img" class="max-w-[90vw] max-h-[85vh] object-contain rounded-xl">
    </div>

    <div class="tt" id="toast"></div>
    <button id="btt" class="fixed bottom-6 right-6 z-50 w-12 h-12 bg-primary text-white rounded-full shadow-lg items-center justify-center hover:bg-primary-dark transition-all opacity-0 invisible hidden"><iconify-icon icon="lucide:arrow-up" class="text-xl"></iconify-icon></button>

    <script type="module" src="./src/app.js"></script>
</body>

</html>
